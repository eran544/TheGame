services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: thegame-postgres
    environment:
      - POSTGRES_DB=TheGameDB
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YourStrong@Passw0rd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - thegame-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TheGameDB"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: thegame-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - thegame-network

  # .NET Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: thegame-server
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=TheGameDB;Username=postgres;Password=YourStrong@Passw0rd
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - thegame-network
    volumes:
      - ./server:/app
    command: ["dotnet", "watch", "run", "--urls", "http://0.0.0.0:8080"]

  # Python AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: thegame-ai-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis
    networks:
      - thegame-network
    volumes:
      - ./ai-service:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # React Client (Development)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: thegame-client
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE_URL=http://10.0.0.31:5001
      - REACT_APP_SIGNALR_HUB_URL=http://10.0.0.31:5001/gamehub
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - thegame-network
    command: ["npm", "start"]

volumes:
  postgres_data:
  redis_data:

networks:
  thegame-network:
    driver: bridge
