services:
  # PostgreSQL Database — hosts all three logical DBs: TheGameDB (created here),
  # AuthDB and Flip7DB (created by their services' EF migrations on startup).
  postgres:
    image: postgres:16-alpine
    container_name: thegame-postgres
    environment:
      - POSTGRES_DB=TheGameDB
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YourStrong@Passw0rd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - thegame-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TheGameDB"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis Cache — shared session store across all services.
  redis:
    image: redis:7-alpine
    container_name: thegame-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - thegame-network

  # Auth / Identity service (owns AuthDB, issues platform JWTs)
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile.dev
    container_name: thegame-auth
    working_dir: /src/services/auth
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=AuthDB;Username=postgres;Password=YourStrong@Passw0rd
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - thegame-network
    volumes:
      - ./services/auth:/src/services/auth
      - ./shared:/src/shared
      - /src/services/auth/bin
      - /src/services/auth/obj
      # GameCommon build output must be container-private: the host dotnet and
      # the other service containers build the same mounted project, and shared
      # bin/obj causes file-lock collisions that abort dotnet watch.
      - /src/shared/GameCommon/bin
      - /src/shared/GameCommon/obj
    command: ["dotnet", "watch", "run", "--urls", "http://0.0.0.0:8080"]

  # The Game service (owns TheGameDB)
  server:
    build:
      context: .
      dockerfile: services/the-game/Dockerfile.dev
    container_name: thegame-server
    working_dir: /src/services/the-game
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=TheGameDB;Username=postgres;Password=YourStrong@Passw0rd
      - ConnectionStrings__Redis=redis:6379
      - AIService__BaseUrl=http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - thegame-network
    volumes:
      - ./services/the-game:/src/services/the-game
      - ./shared:/src/shared
      - /src/services/the-game/bin
      - /src/services/the-game/obj
      - /src/shared/GameCommon/bin
      - /src/shared/GameCommon/obj
    command: ["dotnet", "watch", "run", "--urls", "http://0.0.0.0:8080"]

  # Flip 7 service (owns Flip7DB — schema in Phase 2)
  flip7:
    build:
      context: .
      dockerfile: services/flip7/Dockerfile.dev
    container_name: thegame-flip7
    working_dir: /src/services/flip7
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=Flip7DB;Username=postgres;Password=YourStrong@Passw0rd
      - ConnectionStrings__Redis=redis:6379
      - AIService__BaseUrl=http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - thegame-network
    volumes:
      - ./services/flip7:/src/services/flip7
      - ./shared:/src/shared
      - /src/services/flip7/bin
      - /src/services/flip7/obj
      - /src/shared/GameCommon/bin
      - /src/shared/GameCommon/obj
    command: ["dotnet", "watch", "run", "--urls", "http://0.0.0.0:8080"]

  # Python AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: thegame-ai-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis
    networks:
      - thegame-network
    volumes:
      - ./ai-service:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # React Client (Development)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: thegame-client
    ports:
      - "3000:3000"
    environment:
      # The client calls same-origin /svc/* paths; the dev server proxies them
      # to the service containers (see client/vite.config.ts).
      - PROXY_AUTH_TARGET=http://auth:8080
      - PROXY_THEGAME_TARGET=http://server:8080
      - PROXY_FLIP7_TARGET=http://flip7:8080
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - thegame-network
    command: ["npm", "start"]

volumes:
  postgres_data:
  redis_data:

networks:
  thegame-network:
    driver: bridge
